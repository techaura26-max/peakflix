services:
  - type: web
    name: peakflix-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run migrate && npm run server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_MODE
        value: require
      - key: DATABASE_POOL_MAX
        value: 5
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BCRYPT_ROUNDS
        value: 12
