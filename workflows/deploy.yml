name: Deploy PeakFlix to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --include=dev --package-lock=false --registry=https://registry.npmjs.org

      - name: Verify dependency tree and TMDB secret
        run: |
          node ./node_modules/typescript/bin/tsc --version
          node ./node_modules/vite/bin/vite.js --version
          node -e "require('picocolors'); console.log('picocolors OK')"
          test -n "$VITE_TMDB_READ_TOKEN" || (echo "TMDB_READ_TOKEN secret is missing" && exit 1)

      - name: Build live TMDB website
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
